<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="../estilos/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta.</p>
                <form action="" method="post" autocomplete="off">
                   
                    <p>
                        <label for="iemail"><span class="material-icons">3p</span></label>
                        <input type="email" name="email" id="iemail">
                    </p>
                    <p>
                        <label for="isenha"> <span class="material-icons">key</span></label>
                        <input type="password" name="senha" id="isenha">
                    </p>
                    <p>
                        <input type="submit" value="Entrar">
                    </p>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
